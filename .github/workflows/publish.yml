name: Publish Package

on:
  push:
    tags:
      - "v*"

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Lint
        run: bun run lint

      - name: Run unit tests
        run: bun run test:unit

      - name: Build package
        run: bun run build

      - name: Check package exports
        run: bun run publint

      - name: Smoke test exports
        run: bun run check:exports

      - name: Check declarations
        run: bun run check:declarations

      - name: Check types are correct
        run: bun run attw

      - name: Publish to npm
        run: npm publish --access public
