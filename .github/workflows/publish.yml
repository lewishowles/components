name: Publish Package

on:
  push:
    tags:
      - "v*"

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://npm.pkg.github.com"

      - name: Write .npmrc for GitHub Packages auth
        run: |
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> .npmrc
          echo "@lewishowles:registry=https://npm.pkg.github.com" >> .npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.ACTIONS_TOKEN }}

      - name: Install dependencies
        run: bun install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.ACTIONS_TOKEN }}

      - name: Lint
        run: bun run lint:check

      - name: Run unit tests
        run: bun run test:unit:run

      - name: Build package
        run: bun run build

      - name: Check package exports
        run: bun run publint

      - name: Smoke test exports
        run: bun run check:exports

      - name: Check declarations
        run: bun run check:declarations

      - name: Check types are correct
        run: bun run attw

      - name: Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.ACTIONS_TOKEN }}
