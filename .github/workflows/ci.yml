name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Unit tests, lint, and docs build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "26"

      - name: Write .npmrc for GitHub Packages auth
        run: |
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> .npmrc
          echo "@lewishowles:registry=https://npm.pkg.github.com" >> .npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.ACTIONS_TOKEN }}

      - name: Install dependencies
        run: bun install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.ACTIONS_TOKEN }}

      - name: Lint
        run: bun run lint:check

      - name: Unit tests
        run: bun run test:unit:run

      - name: Build package
        run: bun run build

      - name: Check package exports
        run: bun run publint

      - name: Smoke test exports
        run: bun run check:exports

      - name: Check types are correct
        run: bun run attw

      - name: Build docs
        run: bun run build:docs

  cypress:
    name: Cypress component tests
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Write .npmrc for GitHub Packages auth
        run: |
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" >> .npmrc
          echo "@lewishowles:registry=https://npm.pkg.github.com" >> .npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.ACTIONS_TOKEN }}

      - name: Install dependencies
        run: bun install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.ACTIONS_TOKEN }}

      - name: Cypress component tests
        uses: cypress-io/github-action@v6
        with:
          component: true
